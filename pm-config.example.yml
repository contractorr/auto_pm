repo:
  full_name: contractorr/stewardme
  default_branch: main
  product_file: PRODUCT.md
  memory_file: .github/pm-agent-memory.json
  project_roots:
    - .
  ignore_paths:
    - venv/
    - node_modules/
    - .next/
    - dist/

triggers:
  on_push_to_main: true
  schedules:
    - "0 9 * * 1-5"
    - "0 9 * * 0"

runtime:
  mode: docker_compose
  # For remote dogfooding against a live site, switch to `external_url`
  # and point `service_urls` at the deployed base URL instead.
  # mode: external_url
  compose_file: docker-compose.yml
  startup_timeout_seconds: 180
  healthcheck_timeout_seconds: 120
  service_urls:
    - http://localhost:3000
    - http://localhost:8000
  healthcheck_urls:
    - http://localhost:3000/login

dogfooding:
  enabled: true
  auth_strategy: test_auth
  # For remote logins, switch to `credentials` and supply env-backed secrets:
  # auth_strategy: credentials
  # credentials:
  #   username:
  #     env: PM_AGENT_DOGFOOD_USERNAME
  #   password:
  #     env: PM_AGENT_DOGFOOD_PASSWORD
  #   totp:
  #     secret:
  #       env: PM_AGENT_DOGFOOD_TOTP_SECRET
  setup_script: web/e2e/fixtures/auth.setup.ts
  journeys:
    - id: login-home
      persona: junior_dev
      start_path: /login
      steps:
        - id: sign-in
          action: sign_in_test_user
          target: junior_dev
          expect_url: /home
        # For remote credential auth, use normal fill steps with placeholders:
        # - id: fill-email
        #   action: fill
        #   selector: input[name="email"]
        #   value: "{{ credentials.username }}"
        # - id: fill-password
        #   action: fill
        #   selector: input[name="password"]
        #   value: "{{ credentials.password }}"
        # - id: submit-login
        #   action: click
        #   selector: button[type="submit"]
        # - id: fill-totp
        #   action: fill
        #   selector: input[name="otp"]
        #   value: "{{ credentials.totp_code }}"
        - id: visit-home
          action: goto
          target: /home
          wait_for: h1

research:
  competitors:
    - https://www.notion.so/product/ai
    - https://www.perplexity.ai/
  arxiv_categories:
    - cs.HC
    - cs.SE

anthropic:
  enabled: false
  api_key_env: ANTHROPIC_API_KEY
  model: claude-3-7-sonnet-latest
  max_tokens: 1800
  temperature: 0.0
  research_review_enabled: true
  cluster_review_enabled: true
  portfolio_review_enabled: true
  issue_writer_enabled: true

github:
  labels:
    - ai-generated
    - pm-agent
    - ux
  stale_days: 21
  write_mode: disabled
  update_ai_authored_issues_only: true

issue_policy:
  max_new_issues_per_run: 3
  min_priority_score: 24.0
  min_confidence: 3.0
  cooldown_days_per_cluster: 14
  auto_close_ai_issues_only: true
  auto_close_absent_runs: 2
